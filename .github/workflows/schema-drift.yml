name: Schema Drift Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  schema-drift:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Probe production schema for drift
        run: node scripts/check-schema-drift.mjs --verbose
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          # Server-only secret (sb_secret_…). Deliberately NOT VITE_-prefixed so it can
          # never be inlined into a client bundle. Set in repo Actions secrets.
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
