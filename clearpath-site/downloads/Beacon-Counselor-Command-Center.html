<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Beacon has moved — Counselor Command Center</title>
<meta name="robots" content="noindex">
<meta http-equiv="refresh" content="0; url=https://beacon.clearpathedgroup.com/setup">
<link rel="canonical" href="https://beacon.clearpathedgroup.com/setup">
<style>
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:#0D3B2E;color:#f0e6d3;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
  .card{max-width:460px}
  h1{font-size:1.4rem;font-weight:700;margin:0 0 12px;color:#fde68a}
  p{font-size:.95rem;line-height:1.55;color:rgba(240,230,211,.85);margin:0 0 16px}
  a{display:inline-block;background:#2A9D8F;color:#fff;text-decoration:none;font-weight:700;padding:12px 22px;border-radius:8px;margin-top:8px}
  a:hover{background:#22c55e}
  code{background:rgba(0,0,0,.3);padding:2px 8px;border-radius:4px;font-size:.82rem;color:#fde68a}
</style>
</head>
<body>
<div class="card">
  <h1>Beacon has moved</h1>
  <p>The Beacon app is now hosted at <code>beacon.clearpathedgroup.com</code>. You should be redirected automatically.</p>
  <p>If the page doesn't redirect within a few seconds, click below:</p>
  <a id="go" href="https://beacon.clearpathedgroup.com/setup">Open Beacon →</a>
</div>
<script>
(function(){
  // Preserve any query string (e.g. ?key=BCN-XXXXXX-XXXX) across the redirect
  var qs = window.location.search || '';
  var target = 'https://beacon.clearpathedgroup.com/setup' + qs;
  document.getElementById('go').href = target;
  // Replace so back-button doesn't land on this stub
  window.location.replace(target);
})();
</script>
</body>
</html>
