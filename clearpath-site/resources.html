<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resources — Clear Path Education Group</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --deep-purple:#1a0a2e; --dark-bg:#0e0618; --mid-purple:#2d1054;
    --purple:#6b2fa0; --purple-light:#9b5fd4; --amber:#e8862a;
    --amber-light:#f5b050; --amber-glow:#ffcc66; --orange:#d4541a;
    --text:#f0e6d3; --text-muted:rgba(240,230,211,0.6);
    --border:rgba(232,134,42,0.2); --border-purple:rgba(107,47,160,0.35);
    --card-bg:rgba(26,10,46,0.7);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:'Raleway',sans-serif;background:var(--dark-bg);color:var(--text);min-height:100vh}
  body::before{content:'';position:fixed;inset:0;z-index:0;background:
    radial-gradient(ellipse at 20% 20%,rgba(107,47,160,.15) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 80%,rgba(212,84,26,.1) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 50%,rgba(26,10,46,1) 0%,#0e0618 100%);
    pointer-events:none}

  /* NAV */
  nav{position:fixed;top:0;width:100%;z-index:200;background:rgba(14,6,24,.92);
    backdrop-filter:blur(16px);border-bottom:1px solid var(--border);
    padding:0 5%;display:flex;align-items:center;justify-content:space-between;height:70px}
  .nav-logo{display:flex;align-items:center;gap:14px;text-decoration:none}
  .nav-logo img{height:44px;width:44px;object-fit:contain;border-radius:8px}
  .nav-logo-text .name{font-family:'Cinzel',serif;font-size:.95rem;font-weight:700;
    background:linear-gradient(90deg,var(--amber-light),var(--amber-glow));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    line-height:1.2;display:block}
  .nav-logo-text .sub{font-size:.6rem;font-weight:600;color:var(--text-muted);
    letter-spacing:.12em;text-transform:uppercase;display:block}
  .nav-back{font-size:.8rem;font-weight:600;color:var(--text-muted);text-decoration:none;
    letter-spacing:.06em;text-transform:uppercase;transition:color .2s}
  .nav-back:hover{color:var(--amber-light)}

  /* PAGE */
  .page{position:relative;z-index:1;padding:110px 5% 80px;max-width:1100px;margin:0 auto}
  .page-eyebrow{display:inline-flex;align-items:center;gap:8px;
    background:rgba(232,134,42,.1);border:1px solid rgba(232,134,42,.3);
    color:var(--amber-light);padding:6px 16px;border-radius:4px;
    font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:20px}
  .page-eyebrow span{width:5px;height:5px;background:var(--amber);border-radius:50%;box-shadow:0 0 8px var(--amber)}
  .page-title{font-family:'Cinzel',serif;font-size:clamp(2rem,4vw,3rem);font-weight:900;
    line-height:1.15;margin-bottom:16px;
    background:linear-gradient(160deg,var(--amber-glow) 0%,var(--amber-light) 50%,var(--text) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .page-sub{font-size:1rem;color:var(--text-muted);line-height:1.75;max-width:560px;margin-bottom:48px}

  /* CATEGORY TABS */
  .cat-tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:40px}
  .cat-tab{padding:10px 22px;border-radius:6px;font-weight:700;font-size:.8rem;
    text-transform:uppercase;letter-spacing:.07em;cursor:pointer;border:none;
    background:rgba(26,10,46,.6);color:var(--text-muted);
    border:1px solid var(--border-purple);transition:all .2s}
  .cat-tab:hover{border-color:var(--amber);color:var(--amber-light)}
  .cat-tab.active{background:linear-gradient(135deg,var(--amber),var(--orange));
    color:white;border-color:transparent;box-shadow:0 0 20px rgba(232,134,42,.35)}

  /* RESOURCE GRID */
  .resource-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
  .resource-card{background:var(--card-bg);border:1px solid var(--border-purple);
    border-radius:14px;padding:28px;position:relative;overflow:hidden;
    transition:transform .25s,border-color .25s,box-shadow .25s;backdrop-filter:blur(8px)}
  .resource-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,var(--amber),var(--orange))}
  .resource-card:hover{transform:translateY(-5px);border-color:var(--amber);
    box-shadow:0 0 30px rgba(232,134,42,.3)}
  .resource-type-badge{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    color:var(--amber);margin-bottom:12px;display:block}
  .resource-card h3{font-family:'Cinzel',serif;font-size:1rem;font-weight:700;
    color:var(--text);margin-bottom:10px;line-height:1.4}
  .resource-card p{font-size:.85rem;color:var(--text-muted);line-height:1.7;margin-bottom:20px}
  .resource-link{display:inline-flex;align-items:center;gap:8px;
    background:linear-gradient(135deg,var(--amber),var(--orange));
    color:white;padding:10px 20px;border-radius:6px;font-weight:700;
    font-size:.78rem;text-decoration:none;letter-spacing:.05em;text-transform:uppercase;
    transition:transform .2s,box-shadow .2s}
  .resource-link:hover{transform:translateY(-2px);box-shadow:0 0 20px rgba(232,134,42,.4)}

  /* BUNDLE HIGHLIGHT */
  .resource-card.bundle{border-color:var(--amber);background:rgba(232,134,42,.08)}
  .resource-card.bundle::before{height:3px;background:linear-gradient(90deg,var(--amber-glow),var(--amber),var(--orange))}

  /* EMPTY STATE */
  .empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;
    color:var(--text-muted);font-size:.95rem}
  .empty-icon{font-size:2.5rem;margin-bottom:16px;opacity:.4}

  /* LOADING */
  .loading-state{text-align:center;padding:60px 20px;color:var(--text-muted);font-size:.9rem}
  .loading-dot{display:inline-block;animation:pulse 1.4s infinite}
  .loading-dot:nth-child(2){animation-delay:.2s}
  .loading-dot:nth-child(3){animation-delay:.4s}
  @keyframes pulse{0%,80%,100%{opacity:.25}40%{opacity:1}}

  /* FOOTER */
  footer{position:relative;z-index:1;background:#060310;
    border-top:1px solid var(--border-purple);padding:40px 5%;
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
  footer p{font-size:.78rem;color:rgba(240,230,211,.25)}
  footer a{font-size:.78rem;color:var(--text-muted);text-decoration:none}
  footer a:hover{color:var(--amber-light)}

  /* TEACHER PRODUCT CARD — rich inline */
  .teacher-product{background:var(--card-bg);border:1px solid rgba(42,157,143,.35);
    border-radius:14px;overflow:hidden;margin-bottom:24px;backdrop-filter:blur(8px);
    transition:border-color .25s,box-shadow .25s}
  .teacher-product::before{content:'';display:block;height:3px;
    background:linear-gradient(90deg,#2A9D8F,#0d9488,#14b8a6)}
  .teacher-product:hover{border-color:rgba(42,157,143,.6);box-shadow:0 0 30px rgba(42,157,143,.2)}
  .tp-layout{display:flex;gap:0}
  .tp-images{flex:0 0 340px;background:rgba(0,0,0,.4);position:relative;overflow:hidden;min-height:420px}
  .tp-images img{width:100%;height:100%;object-fit:contain;object-position:top center;position:absolute;inset:0;opacity:0;transition:opacity .4s;background:#0a0418}
  .tp-images img.active{opacity:1}
  .tp-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:2}
  .tp-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.3);border:none;
    cursor:pointer;transition:background .2s}
  .tp-dot.active{background:#2A9D8F;box-shadow:0 0 8px rgba(42,157,143,.6)}
  .tp-img-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.5);
    color:white;border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;
    font-size:1rem;display:flex;align-items:center;justify-content:center;z-index:2;
    transition:background .2s}
  .tp-img-nav:hover{background:rgba(42,157,143,.7)}
  .tp-img-prev{left:8px}
  .tp-img-next{right:8px}
  .tp-body{flex:1;padding:28px 28px 24px}
  .tp-badge{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    color:#2A9D8F;margin-bottom:10px;display:block}
  .tp-title{font-family:'Cinzel',serif;font-size:1.15rem;font-weight:700;color:var(--text);
    margin-bottom:10px;line-height:1.4}
  .tp-desc{font-size:.85rem;color:var(--text-muted);line-height:1.7;margin-bottom:14px}
  .tp-activities{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
  .tp-activity-tag{font-size:.72rem;background:rgba(42,157,143,.1);
    border:1px solid rgba(42,157,143,.25);color:#5eead4;padding:4px 10px;border-radius:4px}
  .tp-footer{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-top:auto}
  .tp-price{font-family:'Cinzel',serif;font-size:1.8rem;font-weight:900;
    background:linear-gradient(90deg,#5eead4,#2A9D8F);-webkit-background-clip:text;
    -webkit-text-fill-color:transparent;background-clip:text}
  .tp-buy{display:inline-flex;align-items:center;gap:8px;
    background:linear-gradient(135deg,#2A9D8F,#0d9488);color:white;
    padding:14px 32px;border-radius:8px;font-weight:700;font-size:.9rem;
    text-decoration:none;border:none;cursor:pointer;letter-spacing:.03em;
    transition:transform .2s,box-shadow .2s;box-shadow:0 4px 12px rgba(42,157,143,.3)}
  .tp-buy:hover{transform:translateY(-2px);box-shadow:0 0 24px rgba(42,157,143,.5)}
  .tp-zelle-info{font-size:.75rem;color:var(--text-muted);margin-top:10px}

  @media(max-width:768px){
    .page{padding:100px 5% 60px}.cat-tabs{gap:8px}.cat-tab{padding:8px 16px;font-size:.74rem}
    .tp-layout{flex-direction:column}
    .tp-images{flex:none;height:320px}
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">
    <img src="Waypoint_Behavioral_Solutions_logo_design.jpeg" alt="Clear Path" />
    <div class="nav-logo-text">
      <span class="name">Clear Path Education Group</span>
      <span class="sub">Pathways to Student Success</span>
    </div>
  </a>
  <a class="nav-back" href="/">← Back to Home</a>
</nav>

<div class="page">
  <div class="page-eyebrow"><span></span> Clear Path Education Group</div>
  <h1 class="page-title">Resources</h1>
  <p class="page-sub">Practical tools, guides, and professional learning materials for educators across Texas.</p>

  <div class="cat-tabs" id="cat-tabs">
    <button class="cat-tab" data-cat="all" onclick="setCategory('all', this)">All Resources</button>
    <button class="cat-tab" data-cat="teacher" onclick="setCategory('teacher', this)">Teacher Resources</button>
    <button class="cat-tab" data-cat="principal" onclick="setCategory('principal', this)">Principal Resources</button>
    <button class="cat-tab" data-cat="ib" onclick="setCategory('ib', this)">IB Resources</button>

</div>

<footer>
  <p>© 2026 Clear Path Education Group, LLC · All rights reserved</p>
  <a href="/">clearpathedgroup.com</a>
</footer>

<script>
const SUPABASE_URL = 'https://xbpuqaqpcbixxodblaes.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhicHVxYXFwY2JpeHhvZGJsYWVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNjk4MDQsImV4cCI6MjA4Nzk0NTgwNH0.9Rhmz-FLUXnEQXpRCkg3G2ppzPxs2DinaYDmdD_wvPA';
const HEADERS = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` };

const TYPE_LABELS = { link: 'Article / Link', pdf: 'PDF', video: 'Video', doc: 'Document', tool: 'Tool' };
const CAT_LABELS = { teacher: 'Teacher', principal: 'Principal', ib: 'IB', pd: 'Professional Development', tpt: 'TpT Store' };

let allResources = [];
let currentCat = 'all';

async function loadResources() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/resources?active=eq.true&order=display_order.asc,created_at.desc`, { headers: HEADERS });
    allResources = r.ok ? await r.json() : [];
  } catch(e) {
    allResources = [];
  }
  renderResources();
}

function setCategory(cat, el) {
  currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  // Update URL param without reload
  const url = new URL(window.location);
  if (cat === 'all') url.searchParams.delete('cat'); else url.searchParams.set('cat', cat);
  history.replaceState(null, '', url);
  renderResources();
}

// Image maps for all products
const PRODUCT_IMAGES = {
  "Administrator's Command Toolkit": { images: ['/previews/command-toolkit-store.png','/previews/command-toolkit-sheet1.png','/previews/command-toolkit-sheet2.png','/previews/command-toolkit-sheet3.png'], color: '#f97316', badge: 'Flagship · 14 Tabs' },
  'DAEP Student Tracker': { images: ['/previews/daep-tracker-store.png','/previews/daep-tracker-sheet1.png','/previews/daep-tracker-sheet2.png','/previews/daep-tracker-sheet3.png'], color: '#f97316', badge: '6 Sheets · Auto-Calculate' },
  'ISS Engagement': { images: ['/previews/iss-tracker-store.png','/previews/iss-tracker-sheet1.png','/previews/iss-tracker-sheet2.png','/previews/iss-tracker-sheet3.png'], color: '#3b82f6', badge: 'ISS · Daily Activities' },
  'TEC Consequence': { images: ['/previews/tec-matrix-store.png','/previews/tec-matrix-sheet1.png','/previews/tec-matrix-sheet2.png','/previews/tec-matrix-sheet3.png'], color: '#ef4444', badge: 'TEC §37 Reference' },
  'Navigator': { images: ['/previews/navigator-tracker-store.png','/previews/navigator-tracker-sheet1.png','/previews/navigator-tracker-sheet2.png','/previews/navigator-tracker-sheet3.png'], color: '#3b82f6', badge: 'Behavior · Risk Scores' },
  'Meridian': { images: ['/previews/meridian-sped-store.png','/previews/meridian-sped-sheet1.png','/previews/meridian-sped-sheet2.png','/previews/meridian-sped-sheet3.png'], color: '#a855f7', badge: 'SPED · Compliance' },
  'Investigation Templates': { images: ['/previews/investigation-templates-store.png','/previews/investigation-templates-sheet1.png','/previews/investigation-templates-sheet2.png','/previews/investigation-templates-sheet3.png'], color: '#6366f1', badge: '5 Templates · Print-Ready' },
  'Digital Investigation': { images: ['/previews/digital-intake-store.png','/previews/digital-intake-sheet1.png'], color: '#6366f1', badge: 'Intake Form' },
  'DAEP & Discipline Complete': { images: ['/previews/bundle-daep-store.png'], color: '#f97316', badge: '3-Tool Bundle · Save $8' },
  'Behavior Intervention System': { images: ['/previews/bundle-behavior-store.png'], color: '#3b82f6', badge: '3-Tool Bundle · Save $6' },
  "Administrator's Investigation Kit": { images: ['/previews/bundle-investigation-store.png'], color: '#6366f1', badge: '3-Tool Bundle · Save $10' },
  'Campus Leadership Complete': { images: ['/previews/bundle-flagship-store.png'], color: '#f97316', badge: '8-Tool Bundle · Save $50' },
};

function findProductImages(title) {
  for (const [key, val] of Object.entries(PRODUCT_IMAGES)) {
    if (title.includes(key)) return val;
  }
  return null;
}

const TEACHER_BUNDLES = {
  'Partner Engagement Activities': {
    activities: ['🎙️ Listen Linda','👑 You\'re the Boss','🔄 Sync or Swim','⏱️ Tick-Talk','📸 Snap Show'],
    images: ['/previews/bundle1-page1.png','/previews/bundle1-page2.png','/previews/bundle1-page3.png'],
    count: '5 Activities',
    key: 'b1',
  },
  'Small Group Engagement Activities': {
    activities: ['👔 The CEO','🤝 Consensus Quest','💬 Group Chat','🎲 Pick 6','🏈 Scrum','📱 Social Circle','🎓 Teacher of the Minute','🔇 You\'re on Mute'],
    images: ['/previews/bundle2-page1.png','/previews/bundle2-page2.png','/previews/bundle2-page3.png'],
    count: '8 Activities',
    key: 'b2',
  },
  'Whole Class Engagement Activities': {
    activities: ['🚶 Walk-a-Molies','🃏 Mix Match Mingle','📌 My 2 Cents','💚 Pick Your Passion','🧅 The Onion Ring','📅 OOMF','💡 IYKYK','🤔 Delulu','🙈 Oops My Bad'],
    images: ['/previews/bundle3-page1.png','/previews/bundle3-page2.png','/previews/bundle3-page3.png'],
    count: '9 Activities',
    key: 'b3',
  },
  'Check for Understanding Activities': {
    activities: ['⚡ Quick CFUs (3-in-1)','👁️ POV 321','📸 Regram','👻 Send a Snap','❓ Quiz Quest','✉️ You\'ve Got Mail'],
    images: ['/previews/bundle4-page1.png','/previews/bundle4-page2.png','/previews/bundle4-page3.png'],
    count: '6 Activities',
    key: 'b4',
  },
};

function findTeacherBundle(title) {
  for (const [key, val] of Object.entries(TEACHER_BUNDLES)) {
    if (title.includes(key)) return val;
  }
  return null;
}

function renderResources() {
  const filtered = currentCat === 'all' ? allResources : allResources.filter(r => r.category === currentCat);
  const container = document.getElementById('resource-container');
  if (!filtered.length) {
    container.innerHTML = `<div class="resource-grid"><div class="empty-state"><div class="empty-icon">📂</div>No resources in this category yet.<br><span style="font-size:.8rem;margin-top:8px;display:block">Check back soon — we're adding new materials regularly.</span></div></div>`;
    return;
  }

  // Separate teacher products (rich cards) from other resources (grid cards)
  const teacherProducts = filtered.filter(r => r.category === 'teacher' && r.price && findTeacherBundle(r.title));
  const otherResources = filtered.filter(r => !teacherProducts.includes(r));

  let html = '';

  // Rich teacher product cards
  if (teacherProducts.length) {
    html += `<div style="margin-bottom:32px">`;
    if (currentCat === 'all') html += `<div style="font-family:'Cinzel',serif;font-size:1.2rem;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:10px">Classroom Engagement Strategies <span style="font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:rgba(42,157,143,.15);color:#2A9D8F;border:1px solid rgba(42,157,143,.4);padding:3px 10px;border-radius:4px">By ClearPath Classroom</span></div>`;
    teacherProducts.forEach(res => {
      const bundle = findTeacherBundle(res.title);
      const price = escHtml(res.price);
      const k = bundle.key;
      html += `<div class="teacher-product">
        <div class="tp-layout">
          <div class="tp-images" id="carousel-${k}">
            ${bundle.images.map((img, i) => `<img src="${img}" alt="Preview page ${i+1}" class="${i===0?'active':''}" loading="lazy" />`).join('')}
            <button class="tp-img-nav tp-img-prev" onclick="carouselNav('${k}',-1)">‹</button>
            <button class="tp-img-nav tp-img-next" onclick="carouselNav('${k}',1)">›</button>
            <div class="tp-dots">
              ${bundle.images.map((_, i) => `<button class="tp-dot${i===0?' active':''}" onclick="carouselGo('${k}',${i})"></button>`).join('')}
            </div>
          </div>
          <div class="tp-body" style="display:flex;flex-direction:column">
            <span class="tp-badge">${bundle.count} · Grades 4–12 · Print & Go</span>
            <div class="tp-title">${escHtml(res.title)}</div>
            <div class="tp-desc">${escHtml(res.description)}</div>
            <div class="tp-activities">${bundle.activities.map(a => `<span class="tp-activity-tag">${escHtml(a)}</span>`).join('')}</div>
            <div style="font-size:.78rem;color:var(--text-muted);margin-bottom:16px">✅ Zero prep · ✅ Any subject · ✅ Step-by-step directions · ✅ Teacher tips included</div>
            <div class="tp-footer">
              <span class="tp-price">${price}</span>
              <button class="tp-buy" onclick="openZelle('${escHtml(res.title)}','${price}')">Buy Now →</button>
            </div>
            <div class="tp-zelle-info">Send ${price} via Zelle to <strong>clearpathedgroup</strong> · PDF delivered within 24 hours</div>
          </div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  // Other resources — all paid products get rich cards with Buy Now
  if (otherResources.length) {
    const paidProducts = otherResources.filter(r => r.price);
    const freeResources = otherResources.filter(r => !r.price);

    paidProducts.forEach(res => {
      const pi = findProductImages(res.title) || {};
      const color = pi.color || 'var(--amber)';
      const badge = pi.badge || 'Campus Admin Tool';
      const price = escHtml(res.price);
      html += `<div class="teacher-product" style="border-color:${color}55">
        <div style="height:3px;background:linear-gradient(90deg,${color},${color}cc,${color}88)"></div>
        <div style="padding:28px">
          <span class="tp-badge" style="color:${color}">${badge}</span>
          <div class="tp-title">${escHtml(res.title)}</div>
          <div class="tp-desc">${escHtml(res.description)}</div>
          <div class="tp-footer">
            <span class="tp-price" style="background:linear-gradient(90deg,${color},${color}cc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">${price}</span>
            <button class="tp-buy" style="background:linear-gradient(135deg,${color},${color}cc)" onclick="openZelle('${escHtml(res.title)}','${price}')">Buy Now →</button>
          </div>
          <div class="tp-zelle-info">Send ${price} via Zelle to <strong>clearpathedgroup</strong> · Delivered within 24 hours</div>
        </div>
      </div>`;
    });

    // Free resources
    if (freeResources.length) {
      html += `<div class="resource-grid">${freeResources.map(res => {
        return `<div class="resource-card">
          <span class="resource-type-badge">${(TYPE_LABELS[res.resource_type] || res.resource_type) + ' · ' + (CAT_LABELS[res.category] || res.category)}</span>
          <h3>${escHtml(res.title)}</h3>
          ${res.description ? `<p>${escHtml(res.description)}</p>` : '<p style="min-height:20px"></p>'}
          ${res.url ? `<a href="${escHtml(res.url)}" class="resource-link" target="_blank" rel="noopener">View Resource →</a>` : ''}
        </div>`;
      }).join('')}</div>`;
    }
  }

  container.innerHTML = html;
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Maps resource titles to store.html product IDs for deep linking
function titleToStoreId(title) {
  const map = {
    "Administrator's Command Toolkit": 'command-toolkit',
    'DAEP Student Tracker': 'daep-tracker',
    'ISS Engagement': 'iss-tracker',
    'TEC Consequence': 'tec-matrix',
    'Navigator': 'navigator-tracker',
    'Meridian': 'meridian-sped',
    'Investigation Templates': 'investigation-templates',
    'Digital Investigation': 'digital-intake',
    'DAEP & Discipline Complete': 'bundle-daep',
    'Behavior Intervention System': 'bundle-behavior',
    "Administrator's Investigation Kit": 'bundle-investigation',
    'Campus Leadership Complete': 'bundle-flagship',
    'Partner Engagement Activities': 'partner-activities',
    'Small Group Engagement Activities': 'small-group-activities',
    'Whole Class Engagement Activities': 'whole-class-activities',
    'Check for Understanding Activities': 'cfu-activities',
  };
  for (const [key, id] of Object.entries(map)) {

function carouselGo(key, idx) {
  const container = document.getElementById('carousel-' + key);
  if (!container) return;
  const imgs = container.querySelectorAll('img');
  const dots = container.querySelectorAll('.tp-dot');
  imgs.forEach((img, i) => img.classList.toggle('active', i === idx));
  dots.forEach((dot, i) => dot.classList.toggle('active', i === idx));
}

function carouselNav(key, dir) {
  const container = document.getElementById('carousel-' + key);
  if (!container) return;
  const imgs = container.querySelectorAll('img');
  let current = 0;
  imgs.forEach((img, i) => { if (img.classList.contains('active')) current = i; });
  const next = (current + dir + imgs.length) % imgs.length;
  carouselGo(key, next);
}

// On load: read ?cat= param and activate tab
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const cat = params.get('cat') || 'all';
  currentCat = cat;
  const tab = document.querySelector(`.cat-tab[data-cat="${cat}"]`);
  if (tab) tab.classList.add('active');
  else document.querySelector('.cat-tab[data-cat="all"]').classList.add('active');
  loadResources();
});
